        .blur-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 250, 0.42);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        /* NAV */
        .header-nav {
            width: 100%; background: rgba(255,255,255,0.93);
            border-bottom: 5px solid var(--ppg-black);
            padding: 12px 20px; display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 8px;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; font-size: 1.25rem; }
        .location-badge {
            font-size: 0.78rem; background: var(--bubbles-blue);
            border: 2px solid var(--ppg-black); border-radius: 20px;
            padding: 3px 10px; color: var(--ppg-black); white-space: nowrap;
        }
        .lang-switcher button {
            background: var(--white); border: 3px solid var(--ppg-black);
            padding: 5px 12px; cursor: pointer; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; margin: 0 3px; transition: 0.2s;
        }
        .lang-switcher button.active {
            background: var(--blossom-pink); color: white;
            transform: translateY(-2px); box-shadow: 0 4px 0 var(--ppg-black);
        }

        /* HERO */
        .hero-section { text-align: center; padding: 35px 20px 20px; width: 100%; }
        .timer-card {
            background: var(--white); border: 6px solid var(--ppg-black);
            display: inline-block; padding: 25px 40px; border-radius: 30px;
            box-shadow: 10px 10px 0px var(--bubbles-blue);
        }
        .timer-label { margin: 0; font-size: 1rem; }
        #days-number {
            font-size: 5rem; color: var(--blossom-pink);
            text-shadow: 4px 4px 0 var(--ppg-black); display: block; line-height: 1.1;
        }

        /* CONTAINER */
        .container { width: 90%; max-width: 820px; margin-bottom: 60px; }

        /* UPLOAD AREA */
        .upload-area {
            background: var(--buttercup-green); border: 5px solid var(--ppg-black);
            border-radius: 20px; padding: 22px; margin-bottom: 35px;
            box-shadow: 8px 8px 0 var(--ppg-black);
        }
        textarea {
            width: 100%; height: 85px; border: 4px solid var(--ppg-black);
            border-radius: 12px; padding: 12px; font-family: inherit;
            font-size: 1rem; margin-bottom: 12px; resize: vertical;
            background: rgba(255,255,255,0.92);
        }

        /* MOOD */
        .mood-section { margin-bottom: 14px; }
        .mood-section-label {
            font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; display: block;
        }
        .mood-grid {
            display: flex; flex-wrap: wrap; gap: 7px;
        }
        .mood-btn {
            background: rgba(255,255,255,0.85); border: 3px solid var(--ppg-black);
            border-radius: 50px; padding: 5px 13px; cursor: pointer;
            font-family: inherit; font-size: 0.88rem; transition: 0.18s;
            white-space: nowrap; display: flex; align-items: center; gap: 4px;
        }
        .mood-btn:hover { transform: translateY(-2px); background: #fff; }
        .mood-btn.selected {
            background: var(--blossom-pink); color: white;
            box-shadow: 0 4px 0 var(--ppg-black); transform: translateY(-2px);
        }

        /* ACTION ROW */
        .action-row {
            display: flex; justify-content: space-between;
            align-items: flex-start; flex-wrap: wrap; gap: 10px;
        }
        .file-zone { display: flex; flex-direction: column; gap: 5px; }
        .file-input-label {
            background: var(--white); border: 3px solid var(--ppg-black);
            border-radius: 10px; padding: 7px 14px; cursor: pointer;
            font-family: inherit; font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--ppg-black); transition: 0.15s; display: inline-block;
        }
        .file-input-label:hover { transform: translateY(-1px); }
        #imageInput { display: none; }
        #file-name-display { font-size: 0.78rem; color: #444; }
        #compress-note { font-size: 0.75rem; color: #555; }

        .btn-send {
            background: var(--blossom-pink); color: white;
            border: 4px solid var(--ppg-black); padding: 10px 28px;
            border-radius: 12px; cursor: pointer; font-size: 1.1rem;
            font-family: inherit; box-shadow: 0 5px 0 var(--ppg-black); transition: 0.15s;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--ppg-black); }
        .btn-send:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ppg-black); }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        #loading-txt {
            display: none; text-align: center; font-size: 0.92rem;
            font-weight: bold; margin-top: 10px;
        }

        /* MEMORY GRID */
        .section-title {
            font-size: 1.45rem; margin-bottom: 18px; text-align: center;
        }
        .memory-grid { column-count: 2; column-gap: 20px; }
        @media (max-width: 600px) { .memory-grid { column-count: 1; } }

        .memory-card {
            break-inside: avoid; background: var(--white);
            border: 4px solid var(--ppg-black); border-radius: 15px;
            padding: 15px; margin-bottom: 20px; position: relative;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.1);
        }
        .memory-mood { font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .memory-image {
            width: 100%; border-radius: 8px;
            border: 2px solid var(--ppg-black); margin-bottom: 10px; display: block;
        }
        .memory-text { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.55; }
        .memory-translated {
            font-size: 0.82rem; color: #4a90d4; margin-top: 7px;
            font-style: italic; min-height: 0;
        }
        .memory-footer {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 4px;
        }
        .memory-time { font-size: 0.76rem; color: #999; }
        .memory-location-tag {
            font-size: 0.72rem; background: #e8f4ff;
            border: 1.5px solid #aad4f5; border-radius: 20px;
            padding: 1px 8px; color: #4a7fa5;
        }
        .delete-btn {
            position: absolute; top: -10px; right: -10px;
            background: #ff4757; color: white;
            border: 3px solid var(--ppg-black); border-radius: 50%;
            width: 28px; height: 28px; cursor: pointer;
            font-weight: bold; font-size: 1rem; line-height: 22px;
            text-align: center; padding: 0;
        }

        .footer {
            text-align: center; padding: 20px;
            font-size: 0.82rem; color: #bbb; width: 100%;
        }
    </style>
</head>
<body>
    <div class="page-background"></div>
    <div class="blur-overlay"></div>

    <div class="header-nav">
        <div class="nav-left">
            🌸 <span data-i18n="navTitle">我们的回忆</span>
            <span class="location-badge" id="locationBadge">📍...</span>
        </div>
        <div class="lang-switcher">
            <button onclick="changeLang('zh')" id="btn-zh">中文</button>
            <button onclick="changeLang('en')" id="btn-en">EN</button>
            <button onclick="changeLang('id')" id="btn-id">ID</button>
        </div>
    </div>

    <div class="hero-section">
        <div class="timer-card">
            <p class="timer-label" data-i18n="timerPrefix">Ferizka & HAOYUAN 已相遇</p>
            <span id="days-number">0</span>
            <p class="timer-label" data-i18n="timerSuffix">天了 💕</p>
        </div>
    </div>

    <div class="container">
        <div class="upload-area">
            <textarea id="textInput" data-i18n-placeholder="placeholder"></textarea>

            <div class="mood-section">
                <span class="mood-section-label" data-i18n="moodLabel">心情：</span>
                <div class="mood-grid" id="moodGrid"></div>
            </div>

            <div class="action-row">
                <div class="file-zone">
                    <label class="file-input-label" for="imageInput">
                        📷 <span data-i18n="choosePhoto">选择照片</span>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" onchange="onFileChosen()">
                    <div id="file-name-display"></div>
                    <div id="compress-note"></div>
                </div>
                <button class="btn-send" id="sendBtn" onclick="handleUpload()" data-i18n="btnSend">发射记忆！🚀</button>
            </div>
            <div id="loading-txt">🚀 <span data-i18n="sending">正在发送...</span></div>
        </div>

        <div class="section-title" data-i18n="wallTitle">✨ 我们的回忆墙 ✨</div>
        <div class="memory-grid" id="memoryWall"></div>
    </div>

    <div class="footer">Made with 💕 by Ferizka & HAOYUAN</div>

<script>
    const START_DATE = "2025-05-24";

    // ── MOODS ──────────────────────────────────────────────────────────────
    const MOODS = [
        { emoji: "😊", zh: "开心",   en: "Happy",    id: "Senang"   },
        { emoji: "😂", zh: "大笑",   en: "LOL",      id: "Tertawa"  },
        { emoji: "🥰", zh: "心动",   en: "Adore",    id: "Terpesona"},
        { emoji: "💕", zh: "爱意",   en: "Love",     id: "Cinta"    },
        { emoji: "🎉", zh: "兴奋",   en: "Excited",  id: "Excited"  },
        { emoji: "🌸", zh: "平静",   en: "Calm",     id: "Tenang"   },
        { emoji: "😌", zh: "满足",   en: "Content",  id: "Puas"     },
        { emoji: "🤩", zh: "惊喜",   en: "Amazed",   id: "Kagum"    },
        { emoji: "😢", zh: "想念",   en: "Missing",  id: "Kangen"   },
        { emoji: "😔", zh: "难过",   en: "Sad",      id: "Sedih"    },
        { emoji: "😭", zh: "悲伤",   en: "Crying",   id: "Menangis" },
        { emoji: "😤", zh: "生气",   en: "Angry",    id: "Marah"    },
        { emoji: "😴", zh: "困",     en: "Sleepy",   id: "Ngantuk"  },
        { emoji: "🌙", zh: "深夜",   en: "Late Night",id: "Larut"   },
        { emoji: "🥺", zh: "委屈",   en: "Pouty",    id: "Manja"    },
        { emoji: "🤗", zh: "温暖",   en: "Warm",     id: "Hangat"   },
        { emoji: "😎", zh: "酷",     en: "Cool",     id: "Keren"    },
        { emoji: "🌈", zh: "美好",   en: "Blissful", id: "Indah"    },
    ];

    // ── I18N ───────────────────────────────────────────────────────────────
    const i18n = {
        zh: {
            navTitle:    "我们的回忆",
            timerPrefix: "Ferizka & HAOYUAN 已相遇",
            timerSuffix: "天了 💕",
            placeholder: "想说点什么？✨",
            btnSend:     "发射记忆！🚀",
            confirmDel:  "确定删除这条回忆吗？",
            moodLabel:   "心情：",
            choosePhoto: "选择照片",
            sending:     "正在通过量子隧道发送...",
            wallTitle:   "✨ 我们的回忆墙 ✨",
            transLabel:  "🌐 译：",
            locFail:     "📍 未知位置",
            compressing: "正在压缩图片...",
            compressed:  "已压缩",
        },
        en: {
            navTitle:    "Our Memories",
            timerPrefix: "Ferizka & HAOYUAN have met for",
            timerSuffix: "Days 💕",
            placeholder: "Say something... ✨",
            btnSend:     "Send Memory! 🚀",
            confirmDel:  "Delete this memory?",
            moodLabel:   "Mood: ",
            choosePhoto: "Choose Photo",
            sending:     "Sending through quantum tunnel...",
            wallTitle:   "✨ Our Memory Wall ✨",
            transLabel:  "🌐 Translation: ",
            locFail:     "📍 Unknown Location",
            compressing: "Compressing image...",
            compressed:  "Compressed",
        },
        id: {
            navTitle:    "Kenangan Kita",
            timerPrefix: "Ferizka & HAOYUAN telah bertemu selama",
            timerSuffix: "Hari 💕",
            placeholder: "Mau bilang apa? ✨",
            btnSend:     "Kirim Kenangan! 🚀",
            confirmDel:  "Hapus kenangan ini?",
            moodLabel:   "Suasana: ",
            choosePhoto: "Pilih Foto",
            sending:     "Mengirim lewat terowongan kuantum...",
            wallTitle:   "✨ Dinding Kenangan Kita ✨",
            transLabel:  "🌐 Terjemahan: ",
            locFail:     "📍 Lokasi tidak diketahui",
            compressing: "Mengompresi gambar...",
            compressed:  "Terkompresi",
        }
    };

    const langCodes = { zh: 'zh-CN', en: 'en', id: 'id' };

    // Detect browser language
    const browserLang = navigator.language || 'zh';
    let autoLang = browserLang.startsWith('id') ? 'id' : browserLang.startsWith('zh') ? 'zh' : 'en';
    let currentLang = autoLang;
    let selectedMood = null;
    let currentLocation = "";
    let pendingImageBase64 = null;

    // ── INIT ───────────────────────────────────────────────────────────────
    function initPage() {
        buildMoodGrid();
        changeLang(autoLang);
        updateTimer();
        fetchLocation();
        startCloudSync();
    }

    function buildMoodGrid() {
        const grid = document.getElementById('moodGrid');
        grid.innerHTML = '';
        MOODS.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'mood-btn';
            btn.setAttribute('data-mood', m.emoji);
            btn.onclick = () => selectMood(btn);
            btn.innerHTML = `${m.emoji} <span class="mood-label-text">${m[currentLang] || m.en}</span>`;
            grid.appendChild(btn);
        });
    }

    function updateMoodLabels() {
        document.querySelectorAll('.mood-btn').forEach(btn => {
            const emoji = btn.getAttribute('data-mood');
            const m = MOODS.find(x => x.emoji === emoji);
            if (m) btn.querySelector('.mood-label-text').innerText = m[currentLang] || m.en;
        });
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - new Date(START_DATE)) / (1000*60*60*24));
        document.getElementById("days-number").innerText = diff > 0 ? diff : 0;
    }

    // ── LANGUAGE ───────────────────────────────────────────────────────────
    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key] !== undefined) el.innerText = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });
        updateMoodLabels();
        // Re-translate visible cards
        document.querySelectorAll('.memory-translated[data-original]').forEach(el => {
            const orig = el.getAttribute('data-original');
            const origLang = el.getAttribute('data-orig-lang') || 'zh';
            if (orig && origLang !== lang) {
                translateText(orig, origLang, lang).then(t => {
                    el.innerText = t ? i18n[lang].transLabel + t : '';
                });
            } else {
                el.innerText = '';
            }
        });
    }

    // ── LOCATION ───────────────────────────────────────────────────────────
    async function fetchLocation() {
        const badge = document.getElementById('locationBadge');
        badge.innerText = '📍...';
        try {
            const pos = await new Promise((res, rej) =>
                navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
            );
            const { latitude, longitude } = pos.coords;
            const resp = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
            );
            const data = await resp.json();
            const city = data.address.city || data.address.town || data.address.village || data.address.county || '';
            const country = data.address.country_code ? data.address.country_code.toUpperCase() : '';
            currentLocation = city ? `${city}, ${country}` : country;
            badge.innerText = `📍 ${currentLocation}`;
        } catch(e) {
            currentLocation = '';
            badge.innerText = i18n[currentLang].locFail;
        }
    }

    // ── MOOD ───────────────────────────────────────────────────────────────
    function selectMood(btn) {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMood = btn.getAttribute('data-mood');
    }

    // ── IMAGE HANDLING ─────────────────────────────────────────────────────
    async function compressImage(file, maxKB = 600) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let { width, height } = img;
                    // Scale down if very large
                    const MAX_DIM = 1600;
                    if (width > MAX_DIM || height > MAX_DIM) {
                        const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Binary search for quality that hits target size
                    let lo = 0.1, hi = 0.92, quality = 0.75, result = '';
                    for (let i = 0; i < 8; i++) {
                        const mid = (lo + hi) / 2;
                        result = canvas.toDataURL('image/jpeg', mid);
                        const kb = (result.length * 3) / 4 / 1024;
                        if (kb > maxKB) hi = mid;
                        else { lo = mid; quality = mid; }
                    }
                    result = canvas.toDataURL('image/jpeg', quality);
                    resolve(result);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function onFileChosen() {
        const file = document.getElementById('imageInput').files[0];
        const nameEl = document.getElementById('file-name-display');
        const noteEl = document.getElementById('compress-note');
        if (!file) { nameEl.innerText = ''; noteEl.innerText = ''; pendingImageBase64 = null; return; }

        const origKB = Math.round(file.size / 1024);
        nameEl.innerText = `📎 ${file.name} (${origKB} KB)`;

        if (file.size > 600 * 1024) {
            noteEl.innerText = i18n[currentLang].compressing;
            pendingImageBase64 = await compressImage(file, 800);
            const newKB = Math.round((pendingImageBase64.length * 3) / 4 / 1024);
            noteEl.innerText = `✅ ${i18n[currentLang].compressed}: ${origKB} KB → ${newKB} KB`;
        } else {
            noteEl.innerText = '';
            pendingImageBase64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }
    }

    // ── SEND ───────────────────────────────────────────────────────────────
    async function handleUpload() {
        const text = document.getElementById('textInput').value.trim();
        if (!text && !pendingImageBase64) return;

        const btn = document.getElementById('sendBtn');
        const loader = document.getElementById('loading-txt');
        btn.disabled = true;
        loader.style.display = 'block';

        try {
            await window.fb.addDoc(window.fb.collection(window.fb.db, "posts"), {
                text:        text || "",
                image:       pendingImageBase64 || null,
                mood:        selectedMood || "",
                lang:        currentLang,
                location:    currentLocation || "",
                timestamp:   Date.now(),
                displayTime: new Date().toLocaleString()
            });

            document.getElementById('textInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('file-name-display').innerText = '';
            document.getElementById('compress-note').innerText = '';
            pendingImageBase64 = null;
            selectedMood = null;
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        } catch(e) {
            console.error(e);
            alert("Cloud connection failed. Check Firestore rules!");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // ── TRANSLATE ──────────────────────────────────────────────────────────
    async function translateText(text, fromLang, toLang) {
        if (!text || fromLang === toLang) return null;
        try {
            const from = langCodes[fromLang] || fromLang;
            const to = langCodes[toLang] || toLang;
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,400))}&langpair=${from}|${to}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.responseStatus === 200) return data.responseData.translatedText;
        } catch(e) {}
        return null;
    }

    // ── CLOUD SYNC ─────────────────────────────────────────────────────────
    function startCloudSync() {
        const checkFB = setInterval(() => {
            if (window.fb) {
                clearInterval(checkFB);
                const q = window.fb.query(
                    window.fb.collection(window.fb.db, "posts"),
                    window.fb.orderBy("timestamp", "desc")
                );
                window.fb.onSnapshot(q, (snapshot) => {
                    const wall = document.getElementById('memoryWall');
                    wall.innerHTML = '';
                    snapshot.forEach(docSnap => renderCard(wall, docSnap.id, docSnap.data()));
                });
            }
        }, 500);
    }

    function renderCard(wall, id, data) {
        const card = document.createElement('div');
        card.className = 'memory-card';
        const origLang = data.lang || 'zh';
        const locTag = data.location ? `<span class="memory-location-tag">📍 ${escapeHTML(data.location)}</span>` : '';

        card.innerHTML = `
            <button class="delete-btn" onclick="deleteMsg('${id}')">×</button>
            ${data.mood ? `<span class="memory-mood">${data.mood}</span>` : ''}
            ${data.image ? `<img src="${data.image}" class="memory-image" loading="lazy">` : ''}
            <div class="memory-text">${escapeHTML(data.text)}</div>
            <div class="memory-translated" data-original="${escapeAttr(data.text)}" data-orig-lang="${origLang}"></div>
            <div class="memory-footer">
                <span class="memory-time">📅 ${data.displayTime || ''}</span>
                ${locTag}
            </div>
        `;
        wall.appendChild(card);

        // Auto-translate if needed
        const transEl = card.querySelector('.memory-translated');
        if (data.text && origLang !== currentLang) {
            translateText(data.text, origLang, currentLang).then(t => {
                if (t) transEl.innerText = i18n[currentLang].transLabel + t;
            });
        }
    }

    async function deleteMsg(id) {
        if (confirm(i18n[currentLang].confirmDel)) {
            await window.fb.deleteDoc(window.fb.doc(window.fb.db, "posts", id));
        }
    }

    function escapeHTML(str) {
        if (!str) return '';
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }
    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    window.onload = initPage;
</script>
