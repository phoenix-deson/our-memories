<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>我们的回忆 | Our Memories (Cloud)</title>
    <meta name="description" content="Ferizka & HAOYUAN 的专属超能纪念馆">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUaVm1CuujLBzkjnlPRfzdZci_kjFBJMw",
            authDomain: "our-memories-44aca.firebaseapp.com",
            projectId: "our-memories-44aca",
            storageBucket: "our-memories-44aca.firebasestorage.app",
            messagingSenderId: "736843860812",
            appId: "1:736843860812:web:7fb3f12aed408ecede1de9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 将 Firebase 方法挂载到全局，方便下方逻辑调用
        window.fb = { db, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, storage, ref, uploadBytes, getDownloadURL };
    </script>

    <style>
        :root {
            --blossom-pink: #FF92D0;
            --bubbles-blue: #58CCFF;
            --buttercup-green: #9FE73B;
            --ppg-black: #2C2C2C;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka One', 'ZCOOL KuaiLe', cursive;
            background-color: #FFF0F5; color: var(--ppg-black);
            display: flex; flex-direction: column; align-items: center;
        }

        /* 顶部导航 */
        .header-nav {
            width: 100%; background: var(--white); border-bottom: 5px solid var(--ppg-black);
            padding: 15px 0; display: flex; justify-content: space-around; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .lang-switcher button {
            background: var(--white); border: 3px solid var(--ppg-black);
            padding: 6px 12px; cursor: pointer; border-radius: 8px; font-family: inherit;
            margin: 0 5px; transition: 0.2s;
        }

        .lang-switcher button.active {
            background: var(--blossom-pink); color: white;
            transform: translateY(-2px); box-shadow: 0 4px 0 var(--ppg-black);
        }

        /* 计时器 */
        .hero-section { text-align: center; padding: 60px 20px; width: 100%; }
        .timer-card {
            background: var(--white); border: 6px solid var(--ppg-black);
            display: inline-block; padding: 40px; border-radius: 30px;
            box-shadow: 15px 15px 0px var(--bubbles-blue); position: relative;
        }
        #days-number { font-size: 6rem; color: var(--blossom-pink); text-shadow: 5px 5px 0 var(--ppg-black); display: block; margin: 10px 0; }

        .container { width: 90%; max-width: 800px; margin: 30px auto; }

        /* 上传区 */
        .upload-area {
            background: var(--buttercup-green); border: 5px solid var(--ppg-black);
            border-radius: 20px; padding: 25px; margin-bottom: 50px;
            box-shadow: 10px 10px 0 var(--ppg-black);
        }
        textarea {
            width: 100%; height: 100px; border: 4px solid var(--ppg-black);
            border-radius: 12px; padding: 15px; box-sizing: border-box;
            font-family: inherit; font-size: 1.1rem; margin-bottom: 15px;
        }
        .btn-send {
            background: var(--blossom-pink); color: white; border: 4px solid var(--ppg-black);
            padding: 12px 35px; border-radius: 12px; cursor: pointer;
            font-size: 1.3rem; font-family: inherit; box-shadow: 0 5px 0 var(--ppg-black);
        }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; }

        /* 照片墙 */
        .memory-grid { column-count: 2; column-gap: 20px; }
        @media (max-width: 600px) { .memory-grid { column-count: 1; } }

        .memory-card {
            break-inside: avoid; background: var(--white); border: 4px solid var(--ppg-black);
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
        }
        .memory-image { width: 100%; border-radius: 8px; border: 3px solid var(--ppg-black); margin-bottom: 12px; }
        .memory-time { font-size: 0.85rem; color: #777; display: block; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .delete-btn { float: right; background: none; border: none; color: #ff4757; cursor: pointer; font-weight: bold; }

        /* 加载动画 */
        #loading-txt { display: none; color: var(--ppg-black); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-nav">
    <div style="font-size: 1.5rem;">🌸 <span data-i18n="navTitle">我们的回忆</span></div>
    <div class="lang-switcher">
        <button onclick="changeLang('zh')" id="btn-zh">中文</button>
        <button onclick="changeLang('en')" id="btn-en">EN</button>
        <button onclick="changeLang('id')" id="btn-id">ID</button>
    </div>
</div>

<div class="hero-section">
    <div class="timer-card">
        <p data-i18n="timerPrefix" style="margin:0;">Ferizka Hairunnisa & HAOYUAN 已见面</p>
        <span id="days-number">0</span>
        <p data-i18n="timerSuffix" style="margin:0;">天了</p>
    </div>
</div>

<div class="container">
    <div class="upload-area">
        <h3 data-i18n="uploadTitle">🌸 添加新的超能回忆</h3>
        <textarea id="textInput" data-i18n-placeholder="placeholder"></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <input type="file" id="imageInput" accept="image/*">
            <button class="btn-send" id="sendBtn" onclick="handleUpload()" data-i18n="btnSend">发射记忆！</button>
        </div>
        <div id="loading-txt">🚀 正在同步到云端，请稍候...</div>
    </div>

    <h2 style="text-align:center;">💎 <span data-i18n="wallTitle">回忆照片墙</span></h2>
    <div class="memory-grid" id="memoryWall"></div>
</div>

<script>
    const START_DATE = "2025-05-24";
    const i18n = {
        zh: { navTitle: "我们的回忆", timerPrefix: "Ferizka & HAOYUAN 已见面", timerSuffix: "天了", uploadTitle: "添加新记忆", placeholder: "写下甜蜜瞬间...", btnSend: "发射！", wallTitle: "回忆墙", confirmDel: "确定删除吗？" },
        en: { navTitle: "Our Memories", timerPrefix: "Met for", timerSuffix: "Days", uploadTitle: "New Memory", placeholder: "Write something...", btnSend: "Send!", wallTitle: "Memory Wall", confirmDel: "Delete this?" },
        id: { navTitle: "Kenangan Kita", timerPrefix: "Telah bertemu", timerSuffix: "Hari", uploadTitle: "Tambah Kenangan", placeholder: "Tulis sesuatu...", btnSend: "Kirim!", wallTitle: "Dinding Kenangan", confirmDel: "Hapus ini?" }
    };

    let currentLang = 'zh';

    // 1. 初始化
    function initPage() {
        changeLang(['zh', 'en', 'id'].includes(navigator.language.slice(0, 2)) ? navigator.language.slice(0, 2) : 'en');
        updateTimer();
        startCloudSync(); // 开启云端实时同步
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - new Date(START_DATE)) / (1000 * 60 * 60 * 24));
        document.getElementById("days-number").innerText = diff > 0 ? diff : 0;
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.getAttribute('data-i18n')]);
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')]);
    }

    // 2. 云端核心逻辑
    async function handleUpload() {
        const text = document.getElementById('textInput').value;
        const file = document.getElementById('imageInput').files[0];
        if (!text && !file) return;

        const btn = document.getElementById('sendBtn');
        const loader = document.getElementById('loading-txt');
        btn.disabled = true;
        loader.style.display = 'block';

        try {
            let imageUrl = null;
            // 如果有图片，先上云
            if (file) {
                const storageRef = window.fb.ref(window.fb.storage, 'memories/' + Date.now() + '_' + file.name);
                await window.fb.uploadBytes(storageRef, file);
                imageUrl = await window.fb.getDownloadURL(storageRef);
            }

            // 写入 Firestore 数据库
            await window.fb.addDoc(window.fb.collection(window.fb.db, "posts"), {
                text,
                image: imageUrl,
                timestamp: Date.now(),
                displayTime: new Date().toLocaleString()
            });

            document.getElementById('textInput').value = '';
            document.getElementById('imageInput').value = '';
        } catch (e) {
            console.error(e);
            alert("云端连接失败，请检查 Firebase 规则设置！");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function startCloudSync() {
        const checkFB = setInterval(() => {
            if (window.fb) {
                clearInterval(checkFB);
                const q = window.fb.query(window.fb.collection(window.fb.db, "posts"), window.fb.orderBy("timestamp", "desc"));
                
                // 实时监听云端变化，有人发消息，所有人都会秒出内容
                window.fb.onSnapshot(q, (snapshot) => {
                    const wall = document.getElementById('memoryWall');
                    wall.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const card = document.createElement('div');
                        card.className = 'memory-card';
                        card.innerHTML = `
                            <button class="delete-btn" onclick="deleteMsg('${doc.id}')">×</button>
                            ${data.image ? `<img src="${data.image}" class="memory-image">` : ''}
                            <div style="white-space: pre-wrap;">${escapeHTML(data.text)}</div>
                            <span class="memory-time">📅 ${data.displayTime}</span>
                        `;
                        wall.appendChild(card);
                    });
                });
            }
        }, 500);
    }

    async function deleteMsg(id) {
        if (confirm(i18n[currentLang].confirmDel)) {
            await window.fb.deleteDoc(window.fb.doc(window.fb.db, "posts", id));
        }
    }

    function escapeHTML(str) {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    window.onload = initPage;
</script>

</body>
</html>
